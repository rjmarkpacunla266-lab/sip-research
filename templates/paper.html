<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sturch — Reading Paper</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0d12;--surf:#111520;--surf2:#181d2e;--surf3:#1f2540;
  --border:rgba(100,130,220,.1);--accent:#4f8de8;--accent2:#9d6ef5;
  --gold:#e8b84b;--green:#3ecf8e;--red:#f06a6a;--orange:#f0914b;
  --text:#d8e0f8;--muted:#5a6385;
  --mono:'IBM Plex Mono',monospace;--serif:'Lora',serif;--sans:'Outfit',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.65}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.hidden{display:none!important}
#app{max-width:860px;margin:0 auto;padding:0 18px 100px}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.logo{font-family:var(--serif);font-size:1.4rem}
.logo span{color:var(--accent)}
.beta{font-size:.65rem;background:rgba(157,110,245,.1);border:1px solid rgba(157,110,245,.2);color:var(--accent2);padding:2px 7px;border-radius:4px;margin-left:6px;font-family:var(--mono)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--sans);font-size:.83rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surf2);color:var(--text);transition:all .2s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--surf3);border-color:var(--accent);text-decoration:none}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.btn.primary:hover{background:#3d7fd8}
.btn.sm{padding:5px 11px;font-size:.78rem}
.find-bar{position:sticky;top:0;z-index:100;background:rgba(11,13,18,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);margin:0 -18px;padding:10px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.find-wrap{position:relative;flex:1;min-width:180px;max-width:420px}
.find-wrap .fi{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.find-wrap input{width:100%;padding:8px 12px 8px 36px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s}
.find-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,141,232,.12)}
.find-wrap input::placeholder{color:var(--muted)}
.find-nav{display:flex;align-items:center;gap:5px}
.find-count{font-family:var(--mono);font-size:.74rem;color:var(--muted);min-width:88px;text-align:center}
.find-count.not-found{color:var(--red)}
.find-count.found{color:var(--green)}
.nav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .15s}
.nav-btn:hover:not([disabled]){border-color:var(--accent);background:var(--surf3)}
.nav-btn[disabled]{opacity:.3;cursor:not-allowed}
.paper-meta{padding:24px 0 20px;border-bottom:1px solid var(--border)}
.paper-title{font-family:var(--serif);font-size:1.5rem;line-height:1.45;margin-bottom:14px}
.meta-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:10px;font-size:.82rem;color:var(--muted)}
.meta-row .journal{font-style:italic;color:var(--text)}
.badge{font-size:.68rem;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge.oa{background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.2);color:var(--green)}
.badge.src-openalex{background:rgba(79,141,232,.1);border:1px solid rgba(79,141,232,.25);color:#4f8de8}
.badge.src-semantic{background:rgba(157,110,245,.1);border:1px solid rgba(157,110,245,.25);color:#9d6ef5}
.badge.src-arxiv{background:rgba(240,145,75,.1);border:1px solid rgba(240,145,75,.25);color:#f0914b}
.badge.src-pubmed{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.25);color:#3ecf8e}
.cite-badge{font-family:var(--mono);font-size:.7rem;padding:2px 8px;border-radius:20px}
.apa-block{background:var(--surf2);border-left:3px solid var(--muted);border-radius:0 6px 6px 0;padding:10px 13px;font-size:.8rem;font-style:italic;color:var(--muted);margin:12px 0;line-height:1.6}
.warn-inline{font-size:.72rem;color:var(--orange);margin-top:4px}
.paper-links{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.text-section{padding:24px 0}
.text-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.text-label::after{content:'';flex:1;height:1px;background:var(--border)}
.text-source-note{font-size:.75rem;color:var(--muted);margin-bottom:16px;background:var(--surf2);border-radius:6px;padding:8px 12px;border-left:3px solid var(--accent)}
.text-source-note.warning{border-left-color:var(--orange);color:var(--orange)}
#paperText{font-family:var(--serif);font-size:1rem;line-height:1.9;color:#c8d4f0;word-break:break-word}
#paperText p{margin-bottom:1.1em}
mark.hit{background:rgba(232,184,75,.25);color:var(--gold);border-radius:2px;padding:0 2px;scroll-margin-top:120px}
mark.hit.active{background:rgba(232,184,75,.6);color:#fff;outline:2px solid var(--gold);outline-offset:1px}
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state .big{font-size:2rem;margin-bottom:12px}
.state h3{font-family:var(--serif);font-size:1.15rem;color:var(--text);margin-bottom:6px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
#toast{position:fixed;bottom:22px;right:22px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:.85rem;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:300;transform:translateY(50px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fadein{animation:fadeUp .35s ease both}
@media(max-width:600px){.paper-title{font-size:1.2rem}}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo"><span>Sturch</span><span class="beta">BETA</span></div>
  <a href="/" class="btn sm">← Back to Search</a>
</header>

<div class="find-bar">
  <div class="find-wrap">
    <svg class="fi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="findInput" placeholder="Find word in this paper…" autocomplete="off" spellcheck="false"/>
  </div>
  <div class="find-nav">
    <button class="nav-btn" id="prevBtn" onclick="navMatch(-1)" disabled title="Previous match">▲</button>
    <button class="nav-btn" id="nextBtn" onclick="navMatch(1)"  disabled title="Next match">▼</button>
    <span class="find-count" id="findCount">—</span>
  </div>
  <button class="btn sm" onclick="clearFind()">Clear</button>
</div>

<div class="paper-meta fadein" id="paperMeta">
  <div class="state"><div class="spinner"></div><h3>Loading paper…</h3></div>
</div>

<div class="text-section fadein hidden" id="textSection">
  <div class="text-label" id="textLabel">Full Paper Text</div>
  <div class="text-source-note" id="textSourceNote"></div>
  <div id="paperText"></div>
</div>

</div>
<div id="toast"></div>

<script>
let paper=null,matchNodes=[],matchIndex=-1,findTimer=null;

window.addEventListener('load',()=>{
  const raw=sessionStorage.getItem('sturch_paper');
  if(!raw){renderError('No paper data found. Please go back and click a result again.');return;}
  try{paper=JSON.parse(raw);}catch(e){renderError('Could not read paper data.');return;}
  document.title=`Sturch — ${paper.title||'Paper'}`;
  renderMeta(paper);
  fetchFullText(paper);
});

document.addEventListener('keydown',e=>{
  const inp=document.getElementById('findInput');
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();inp.focus();inp.select();}
  if(e.key==='Enter'&&document.activeElement===inp){navMatch(e.shiftKey?-1:1);}
  if(e.key==='Escape'){clearFind();}
});
document.getElementById('findInput').addEventListener('input',()=>{
  clearTimeout(findTimer);findTimer=setTimeout(runFind,250);
});

function renderMeta(p){
  const authors=(p.authors||[]).join(', ')||'—';
  const cites=p.citations||0;
  const cColor=cites>1000?'var(--gold)':cites>100?'var(--accent)':'var(--muted)';
  const oaBadge=p.is_oa?`<span class="badge oa">Open Access</span>`:'';
  const srcBadge=getSourceBadge(p.data_source);
  const missing=p.apa_missing||[];
  document.getElementById('paperMeta').innerHTML=`
    <div class="paper-title">${esc(p.title||'Untitled')}</div>
    <div class="meta-row">
      <span>${esc(authors)}</span><span style="opacity:.4">·</span>
      <span class="journal">${esc(p.journal||'—')}</span><span style="opacity:.4">·</span>
      <span style="font-family:var(--mono);font-size:.75rem">${p.year||'?'}</span>
    </div>
    <div class="meta-row">
      <span class="cite-badge" style="color:${cColor};border:1px solid ${cColor}40;background:${cColor}10">★ ${cites.toLocaleString()} citations</span>
      ${oaBadge}${srcBadge}
      ${p.volume?`<span style="font-family:var(--mono);font-size:.75rem">Vol.${esc(p.volume)}${p.issue?' No.'+esc(p.issue):''}</span>`:''}
      ${p.pages?`<span style="font-family:var(--mono);font-size:.75rem">pp.${esc(p.pages)}</span>`:''}
    </div>
    ${missing.length?`<div class="warn-inline">⚠️ APA may be missing: ${missing.join(', ')}</div>`:''}
    <div class="apa-block">${esc(p.apa_reference||'Not available')}</div>
    <div class="paper-links">
      ${p.doi?`<a href="${esc(p.doi)}" target="_blank" class="btn sm primary">↗ View Paper (DOI)</a>`:''}
      ${p.oa_url?`<a href="${esc(p.oa_url)}" target="_blank" class="btn sm">↗ Original Page</a>`:''}
      <button class="btn sm" onclick="copyAPA()">📋 Copy APA</button>
    </div>`;
}

async function fetchFullText(p){
  document.getElementById('textSection').classList.remove('hidden');
  document.getElementById('textLabel').textContent='Fetching full text…';
  document.getElementById('paperText').innerHTML=
    '<div class="state"><div class="spinner"></div><p style="margin-top:8px;font-size:.85rem">Fetching paper content…</p></div>';
  try{
    const params=new URLSearchParams({
      source:p.data_source||'',oa_url:p.oa_url||'',
      openalex_id:p.openalex_id||'',abstract:p.abstract||''
    });
    const resp=await fetch(`/api/fetch-paper?${params}`);
    const data=await resp.json();
    renderFullText(data);
  }catch(e){
    if(p.abstract){
      renderFullText({text:p.abstract,source:'abstract',full:false,notice:'Could not reach server — showing abstract only.'});
    }else{
      document.getElementById('paperText').innerHTML=
        `<div class="state"><div class="big">⚠️</div><h3>Could not load text</h3><p>Check your connection and try again.</p></div>`;
    }
  }
}

function renderFullText(data){
  const isFull=data.full;
  const noteMap={
    arxiv_html:'✅ Full paper loaded from arXiv HTML',
    pubmed_pmc:'✅ Full paper loaded from PubMed Central',
    oa_url:'✅ Full text loaded from open access source',
    abstract:'⚠️ Full text unavailable — showing abstract only',
    none:'⚠️ No text available for this paper',
  };
  document.getElementById('textLabel').textContent=isFull?'Full Paper Text':'Abstract';
  const note=data.notice||noteMap[data.source]||(isFull?'✅ Full text loaded':'⚠️ Abstract only');
  document.getElementById('textSourceNote').textContent=note;
  document.getElementById('textSourceNote').className='text-source-note'+(!isFull?' warning':'');
  const text=data.text||'';
  if(!text){
    document.getElementById('paperText').innerHTML=
      `<div class="state"><div class="big">📭</div><h3>No text available</h3>
       <p style="margin-top:6px;font-size:.85rem">This paper has no accessible full text or abstract.</p></div>`;
    return;
  }
  const paragraphs=text.split(/\n{2,}/).filter(s=>s.trim());
  document.getElementById('paperText').innerHTML=
    paragraphs.map(para=>`<p>${esc(para.replace(/\n/g,' '))}</p>`).join('');
  toast(`📄 ${isFull?'Full paper loaded':'Abstract loaded'}`);
}

function runFind(){
  const query=document.getElementById('findInput').value.trim();
  clearHighlights();
  if(!query){updateFindCount(0,0,false);return;}
  const container=document.getElementById('paperText');
  if(!container)return;
  const regex=new RegExp(escapeRegex(query),'gi');
  const walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT);
  const toReplace=[];
  let node;
  while((node=walker.nextNode())){if(regex.test(node.nodeValue))toReplace.push(node);regex.lastIndex=0;}
  toReplace.forEach(textNode=>{
    const frag=document.createDocumentFragment();
    let remain=textNode.nodeValue,match;
    regex.lastIndex=0;
    while((match=regex.exec(remain))!==null){
      if(match.index>0)frag.appendChild(document.createTextNode(remain.slice(0,match.index)));
      const mark=document.createElement('mark');
      mark.className='hit';mark.textContent=match[0];frag.appendChild(mark);
      remain=remain.slice(match.index+match[0].length);regex.lastIndex=0;
    }
    if(remain)frag.appendChild(document.createTextNode(remain));
    textNode.parentNode.replaceChild(frag,textNode);
  });
  matchNodes=Array.from(container.querySelectorAll('mark.hit'));
  if(!matchNodes.length){updateFindCount(0,0,true);return;}
  matchIndex=0;activateMatch(0);updateFindCount(1,matchNodes.length,false);
  document.getElementById('prevBtn').disabled=matchNodes.length<=1;
  document.getElementById('nextBtn').disabled=matchNodes.length<=1;
}

function navMatch(dir){
  if(!matchNodes.length)return;
  matchNodes[matchIndex]?.classList.remove('active');
  matchIndex=(matchIndex+dir+matchNodes.length)%matchNodes.length;
  activateMatch(matchIndex);
  updateFindCount(matchIndex+1,matchNodes.length,false);
}
function activateMatch(idx){
  matchNodes.forEach(m=>m.classList.remove('active'));
  const el=matchNodes[idx];if(!el)return;
  el.classList.add('active');
  el.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearHighlights(){
  document.querySelectorAll('mark.hit').forEach(m=>{
    const p=m.parentNode;if(p){p.replaceChild(document.createTextNode(m.textContent),m);p.normalize();}
  });
  matchNodes=[];matchIndex=-1;
  document.getElementById('prevBtn').disabled=true;
  document.getElementById('nextBtn').disabled=true;
}
function clearFind(){
  document.getElementById('findInput').value='';
  clearHighlights();updateFindCount(0,0,false);
}
function updateFindCount(cur,total,notFound){
  const el=document.getElementById('findCount');
  if(notFound){el.textContent='Word not found';el.className='find-count not-found';}
  else if(!total){el.textContent='—';el.className='find-count';}
  else{el.textContent=`${cur} of ${total}`;el.className='find-count found';}
}
function getSourceBadge(ds){
  const s=(ds||'').toLowerCase();
  if(s.includes('semantic'))return`<span class="badge src-semantic">Semantic Scholar</span>`;
  if(s.includes('arxiv'))return`<span class="badge src-arxiv">arXiv</span>`;
  if(s.includes('pubmed'))return`<span class="badge src-pubmed">PubMed</span>`;
  return`<span class="badge src-openalex">OpenAlex</span>`;
}
function copyAPA(){
  const ref=paper?.apa_reference||'';
  if(!ref){toast('No APA reference available');return;}
  navigator.clipboard.writeText(ref).then(()=>toast('📋 APA reference copied'));
}
function renderError(msg){
  document.getElementById('paperMeta').innerHTML=`
    <div class="state"><div class="big">⚠️</div><h3>Something went wrong</h3>
    <p style="margin-top:8px;font-size:.85rem">${esc(msg)}</p>
    <a href="/" class="btn sm" style="margin-top:16px;display:inline-flex">← Back to Search</a></div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
